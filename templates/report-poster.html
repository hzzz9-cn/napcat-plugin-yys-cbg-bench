<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阴阳师藏宝阁分析海报</title>
    <style>
      :root {
        --bg: #0f131a;
        --bg-glow: #243247;
        --panel: rgba(14, 20, 30, 0.82);
        --panel-soft: rgba(255, 255, 255, 0.06);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f7f2e8;
        --muted: rgba(247, 242, 232, 0.72);
        --accent: #d6b17f;
        --accent-soft: rgba(214, 177, 127, 0.16);
        --danger: #ff8f7a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(214, 177, 127, 0.12), transparent 24%),
          radial-gradient(circle at top right, rgba(67, 97, 144, 0.28), transparent 30%),
          linear-gradient(160deg, #0a0e14 0%, #131a25 55%, #1b2432 100%);
      }

      .poster {
        width: 1400px;
        min-height: 1800px;
        padding: 44px;
      }

      .frame {
        min-height: 1712px;
        padding: 34px;
        border-radius: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
          radial-gradient(circle at top right, rgba(214, 177, 127, 0.08), transparent 30%),
          var(--bg);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 32px;
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(214, 177, 127, 0.14), rgba(214, 177, 127, 0.02) 46%),
          linear-gradient(160deg, rgba(36, 50, 71, 0.9), rgba(15, 19, 26, 0.96));
        border: 1px solid rgba(214, 177, 127, 0.16);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -110px -130px auto;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(214, 177, 127, 0.18), transparent 68%);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--accent);
        font-size: 18px;
        letter-spacing: 0.08em;
      }

      .hero-grid {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1.3fr 0.7fr;
        gap: 28px;
        margin-top: 26px;
      }

      .hero-title h1 {
        margin: 0;
        font-size: 58px;
        line-height: 1.08;
      }

      .hero-title p {
        margin: 12px 0 0;
        font-size: 22px;
        color: var(--muted);
      }

      .hero-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .hero-tag {
        padding: 10px 16px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-size: 18px;
      }

      .price-card {
        padding: 24px;
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .price-card .label,
      .section .label,
      .metric .label,
      .list-title {
        color: var(--accent);
        font-size: 17px;
        letter-spacing: 0.08em;
      }

      .price-card .price {
        margin-top: 18px;
        font-size: 62px;
        font-weight: 700;
        line-height: 1;
      }

      .price-card .meta {
        margin-top: 14px;
        display: grid;
        gap: 10px;
        color: var(--muted);
        font-size: 18px;
      }

      .main-grid {
        display: grid;
        grid-template-columns: 1.08fr 0.92fr;
        gap: 22px;
        margin-top: 24px;
      }

      .stack {
        display: grid;
        gap: 22px;
      }

      .section {
        padding: 24px;
        border-radius: 26px;
        background: var(--panel);
        border: 1px solid var(--line);
        backdrop-filter: blur(8px);
      }

      .section h2 {
        margin: 10px 0 0;
        font-size: 32px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .metric {
        min-height: 126px;
        padding: 18px;
        border-radius: 20px;
        background: var(--panel-soft);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .metric .value {
        margin-top: 14px;
        font-size: 40px;
        font-weight: 700;
        line-height: 1.15;
      }

      .metric .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 18px;
      }

      .list {
        display: grid;
        gap: 10px;
        margin: 16px 0 0;
        padding: 0;
        list-style: none;
      }

      .list li {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 20px;
      }

      .resource-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .resource-item {
        padding: 18px;
        border-radius: 20px;
        background: rgba(214, 177, 127, 0.08);
        border: 1px solid rgba(214, 177, 127, 0.14);
      }

      .resource-item .name {
        color: var(--muted);
        font-size: 18px;
      }

      .resource-item .value {
        margin-top: 10px;
        font-size: 36px;
        font-weight: 700;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .summary-box {
        padding: 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .summary-box .big {
        margin-top: 12px;
        font-size: 48px;
        font-weight: 700;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 24px;
        padding: 18px 22px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 16px;
      }

      .warning-list li {
        background: rgba(255, 143, 122, 0.08);
        border-color: rgba(255, 143, 122, 0.16);
        color: #ffd0c6;
      }

      .empty {
        color: var(--muted);
        font-size: 19px;
      }
    </style>
  </head>
  <body>
    <div class="poster">
      <div id="poster-root" class="frame"></div>
    </div>

    <script id="report-data" type="application/json">__REPORT_JSON__</script>
    <script>
      const data = JSON.parse(document.getElementById('report-data').textContent || '{}')

      function renderList(items, className) {
        if (!Array.isArray(items) || items.length === 0) {
          return '<div class="empty">暂无可展示内容</div>'
        }
        return `<ul class="list ${className || ''}">${items.map((item) => `<li>${item}</li>`).join('')}</ul>`
      }

      function renderResourceCards(items) {
        if (!Array.isArray(items) || items.length === 0) {
          return '<div class="empty">暂无资源摘要</div>'
        }
        return `<div class="resource-grid">${items
          .map(
            (item) => `
              <div class="resource-item">
                <div class="name">${item.label}</div>
                <div class="value">${item.value}</div>
              </div>
            `
          )
          .join('')}</div>`
      }

      document.getElementById('poster-root').innerHTML = `
        <section class="hero">
          <div class="eyebrow">藏宝阁帐号报告</div>
          <div class="hero-grid">
            <div>
              <div class="hero-title">
                <h1>${data.hero.serverName || '未知服务器'} · ${data.hero.equipName || '未命名帐号'}</h1>
                <p>${data.hero.areaName || '未知大区'} · 生成于 ${data.generatedAt || '--'}</p>
              </div>
              <div class="hero-tags">
                ${(data.highlights || []).slice(0, 4).map((item) => `<div class="hero-tag">${item}</div>`).join('')}
              </div>
            </div>
            <div class="price-card">
              <div class="label">快速结论</div>
              <div class="price">${data.hero.priceText || '--'}</div>
              <div class="meta">
                <div>状态：${data.hero.statusText || '--'}</div>
                <div>在线时长：${data.hero.daysText || '--'}</div>
                <div>报告编号：${data.reportId || '--'}</div>
              </div>
            </div>
          </div>
        </section>

        <div class="main-grid">
          <div class="stack">
            <section class="section">
              <div class="label">核心资源</div>
              <h2>账号基础盘点</h2>
              ${renderResourceCards(data.resources)}
            </section>

            <section class="section">
              <div class="label">御魂亮点</div>
              <h2>${data.yuhun.speedSummary || '速度待补充'} / ${data.yuhun.critSummary || '暴击待补充'}</h2>
              <div class="metric-grid">
                <div class="metric">
                  <div class="label">库存摘要</div>
                  <div class="hint">用于快速看御魂底盘是否充足</div>
                  ${renderList(data.yuhun.inventorySummary)}
                </div>
                <div class="metric">
                  <div class="label">关键判断</div>
                  <div class="hint">首版保留结构化结论占位</div>
                  ${renderList(data.yuhun.suitJudgements)}
                </div>
              </div>
            </section>
          </div>

          <div class="stack">
            <section class="section">
              <div class="label">图鉴与皮肤</div>
              <h2>收藏完成度</h2>
              <div class="summary-grid">
                <div class="summary-box">
                  <div class="label">缺失 SP</div>
                  <div class="big">${data.collection.missingSp ?? 0}</div>
                </div>
                <div class="summary-box">
                  <div class="label">缺失 SSR</div>
                  <div class="big">${data.collection.missingSsr ?? 0}</div>
                </div>
              </div>
              <div class="list-title" style="margin-top:18px">联动摘要</div>
              ${renderList(data.collection.linkageSummary)}
              <div class="list-title" style="margin-top:18px">皮肤摘要</div>
              ${renderList(data.collection.skinSummary)}
            </section>

            <section class="section">
              <div class="label">注意事项</div>
              <h2>风险与兼容性提示</h2>
              ${renderList(data.warnings, 'warning-list')}
            </section>
          </div>
        </div>

        <footer class="footer">
          <div>来源链接：${data.sourceUrl || '--'}</div>
          <div>NapCat · 阴阳师藏宝阁分析</div>
        </footer>
      `
    </script>
  </body>
</html>
